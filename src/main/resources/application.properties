spring.application.name=ts4j-showcase

spring.datasource.url=jdbc:mysql://localhost:3308/ts4j_showcase?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${TS4J_SC_MYSQL_USER}
spring.datasource.password=${TS4J_SC_MYSQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

messaging.telegram.bot.name=${TS4J_TG_BOT_NAME}
messaging.telegram.bot.password=${TS4J_TG_BOT_PW}

# Telegram Bot Starter properties
bot.name=${TS4J_TG_BOT_NAME}
bot.token=${TS4J_TG_BOT_PW}
