spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Binance API credentials (demo)
# Note that these credentials must be created in the demo account (https://demo.binance.com), not the real one.
# Using any real API key will result in a 401 Unauthorized error.
#binance.api.key=${BINANCE_DEMO_API_KEY}
binance.api.key=${BINANCE_DEMO_API_KEY}
#binance.api.secret=${BINANCE_DEMO_API_SECRET}
binance.api.secret=${BINANCE_DEMO_API_SECRET}
binance.use-real-api=false

# Percentage of the user account balance in the commission asset.
# Ranges between 0 and 100. A value of 5 means, The value of a new position is equal to 5% of the account balance
# (of USDT for instance).
trade.position.size-percentage=10

trade.api.websocket.real.url=wss://fstream.binance.com
trade.api.websocket.test.url=wss://fstream.binancefuture.com

trade.strategy.create=EmaCrossConfiguration-test
